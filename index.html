<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>BSTIERS Ranking</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">

<style>

body{
background:linear-gradient(180deg,#0b0b0b,#121212);
font-family:Orbitron;
color:white;
margin:0;
animation:fade 1.2s;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;}
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#0f0f0f;
border-bottom:2px solid #ff3c00;
}

.logo{
font-size:28px;
color:#ff3c00;
font-weight:bold;
}

nav a{
margin:10px;
color:white;
text-decoration:none;
}

.search{
background:#1b1b1b;
border:none;
padding:8px;
color:white;
border-radius:6px;
}

.section{
padding:20px;
}

.modes{
display:flex;
gap:15px;
flex-wrap:wrap;
}

.mode{
background:#1a1a1a;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

.mode:hover{
background:#ff3c00;
transform:scale(1.1);
}

.ranking{
margin-top:20px;
}

.player{
display:flex;
align-items:center;
background:#151515;
margin:10px 0;
padding:10px;
border-radius:10px;
transition:0.3s;
}

.player:hover{
background:#222;
transform:scale(1.02);
}

.rank{
font-size:20px;
margin-right:15px;
color:#ff3c00;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
margin-right:10px;
}

.info{
flex:1;
}

.tier{
color:#00d9ff;
}

button{
background:#ff3c00;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#ff6a00;
}

footer{
margin-top:40px;
padding:20px;
text-align:center;
background:#0f0f0f;
border-top:2px solid #ff3c00;
}

/* PANEL MOD */

#panel{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111;
padding:25px;
border-radius:10px;
width:300px;
box-shadow:0 0 20px #ff3c00;
}

#panel input{
width:100%;
margin:5px 0;
padding:8px;
background:#1a1a1a;
border:none;
color:white;
}

#panel button{
width:100%;
margin-top:8px;
}

</style>
</head>

<body>

<header>

<div class="logo">BSTIERS</div>

<nav>
<a href="#">Rankings</a>
<a href="#">Discord</a>
<a href="#">Modalidades</a>
</nav>

<input class="search" id="search" placeholder="Buscar jugador...">

</header>

<div class="section">

<h2>Modalidades</h2>

<div class="modes">
<div class="mode">🎯 Arena Duels</div>
<div class="mode">🔫 Sniper</div>
<div class="mode">💥 Escopeta</div>
<div class="mode">⚡ Subfusil</div>
</div>

<div class="ranking" id="ranking">

<h2>Ranking</h2>

<div class="player">
<div class="rank">#1</div>
<img class="avatar" src="https://i.pravatar.cc/40?img=3">
<div class="info">
<div>PlayerOne</div>
<div class="tier">CR1</div>
</div>
</div>

<div class="player">
<div class="rank">#2</div>
<img class="avatar" src="https://i.pravatar.cc/40?img=4">
<div class="info">
<div>Shadow</div>
<div class="tier">HT1</div>
</div>
</div>

</div>

</div>

<footer>

BSTIERS Competitive Ranking  
Discord próximamente

</footer>

<div id="panel">

<h3>Panel Moderador</h3>

<input id="pname" placeholder="Nombre jugador">
<input id="ptier" placeholder="Tier">

<button onclick="addPlayer()">Agregar jugador</button>

<button onclick="closePanel()">Cerrar</button>

</div>

<script>

let search=document.getElementById("search");

search.addEventListener("keydown",function(e){

if(search.value==="hstdhs"){
document.getElementById("panel").style.display="block";
}

});

function closePanel(){
document.getElementById("panel").style.display="none";
}

function addPlayer(){

let name=document.getElementById("pname").value;
let tier=document.getElementById("ptier").value;

let div=document.createElement("div");

div.className="player";

div.innerHTML=`

<div class="rank">#?</div>
<img class="avatar" src="https://i.pravatar.cc/40">
<div class="info">
<div>${name}</div>
<div class="tier">${tier}</div>
</div>

`;

document.getElementById("ranking").appendChild(div);

}

</script>

</body>
</html>
