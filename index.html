<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSTIERS</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Orbitron',sans-serif;
background:#050505;
color:white;
overflow-x:hidden;
}

/* Fondo animado */
.background{
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle at center,#1a0000,#000000 70%);
z-index:-1;
animation:pulse 4s infinite alternate;
}

@keyframes pulse{
0%{filter:brightness(1);}
100%{filter:brightness(1.2);}
}

header{
text-align:center;
padding:40px 20px;
border-bottom:2px solid #ff0000;
background:rgba(0,0,0,0.8);
}

.logo{
font-size:50px;
font-weight:900;
color:#ff0000;
letter-spacing:3px;
}

.subtitle{
color:#aaa;
margin-top:10px;
}

.discord-btn{
margin-top:20px;
padding:14px 35px;
background:#5865F2;
border:none;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.discord-btn:hover{
transform:scale(1.05);
}

.section{
padding:60px 20px;
text-align:center;
}

.stats{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
margin-bottom:40px;
}

.stat{
font-size:28px;
color:#ff0000;
}

.filters{
margin-bottom:30px;
}

select,input{
padding:10px;
margin:5px;
background:#111;
border:1px solid #333;
color:white;
}

.ranker{
background:#111;
margin:15px auto;
padding:20px;
width:90%;
max-width:800px;
border:1px solid #222;
display:flex;
justify-content:space-between;
align-items:center;
transition:0.3s;
}

.ranker:hover{
border:1px solid #ff0000;
transform:scale(1.02);
}

.left{
display:flex;
align-items:center;
gap:15px;
}

.left img{
width:60px;
height:60px;
border-radius:50%;
border:2px solid #ff0000;
}

.top3{
border:2px solid gold;
box-shadow:0 0 20px rgba(255,215,0,0.4);
}

.position{
font-size:22px;
color:#ff0000;
font-weight:bold;
}

.hidden{
display:none;
}

.panel{
background:#0f0f0f;
padding:30px;
margin-top:40px;
border-top:2px solid #ff0000;
}

.panel input{
display:block;
margin:10px auto;
width:250px;
}

.panel button{
padding:10px 20px;
background:#ff0000;
border:none;
color:white;
cursor:pointer;
margin:5px;
}

footer{
text-align:center;
padding:30px;
background:#111;
margin-top:50px;
border-top:2px solid #ff0000;
}
</style>
</head>

<body>

<div class="background"></div>

<header>
<div class="logo">BSTIERS</div>
<div class="subtitle">Arena Competitiva Oficial de Blood Strike</div>
<button class="discord-btn" onclick="window.open('https://discord.gg/TUINVITE')">
Unirse al Discord
</button>
</header>

<section class="section">

<h2>🏆 Ranking Oficial</h2>

<div class="stats">
<div class="stat">Jugadores: <span id="totalPlayers">0</span></div>
<div class="stat">Modalidades: 4</div>
</div>

<div class="filters">
<input type="text" id="search" placeholder="Buscar jugador o clave staff...">
<select id="modeFilter">
<option value="">Todas las modalidades</option>
<option>Arena Duels</option>
<option>Sniper</option>
<option>Escopeta</option>
<option>Subfusiles</option>
</select>

<select id="tierFilter">
<option value="">Todos los tiers</option>
<option>S</option>
<option>A</option>
<option>B</option>
<option>C</option>
</select>
</div>

<div id="rankingList"></div>

<div id="modPanel" class="hidden panel">
<h2>🔐 Panel Moderador</h2>

<input type="text" id="name" placeholder="Nombre">
<input type="text" id="mode" placeholder="Modalidad">
<input type="text" id="tier" placeholder="Tier (S/A/B/C)">
<input type="text" id="img" placeholder="URL Imagen">

<button onclick="addRanker()">Agregar</button>
<button onclick="clearAll()">Reset Ranking</button>
</div>

</section>

    <footer>
© 2026 BSTIERS | Arena Extrema
</footer>

<script>

let rankers = JSON.parse(localStorage.getItem("bstiers")) || [
{name:"Zerox",mode:"Sniper",tier:"S",img:"https://via.placeholder.com/60"},
{name:"Shadow",mode:"Arena Duels",tier:"A",img:"https://via.placeholder.com/60"}
];

function save(){
localStorage.setItem("bstiers",JSON.stringify(rankers));
}

function render(){
let container=document.getElementById("rankingList");
container.innerHTML="";

let mode=document.getElementById("modeFilter").value;
let tier=document.getElementById("tierFilter").value;
let search=document.getElementById("search").value.toLowerCase();

let filtered=rankers.filter(r=>{
return (!mode||r.mode===mode)&&
(!tier||r.tier===tier)&&
r.name.toLowerCase().includes(search);
});

filtered.forEach((r,i)=>{
container.innerHTML+=`
<div class="ranker ${i<3?"top3":""}">
<div class="left">
<img src="${r.img}">
<div>
<strong>${r.name}</strong><br>
<small>${r.mode}</small><br>
<small>Tier ${r.tier}</small>
</div>
</div>
<div class="position">#${i+1}</div>
</div>
`;
});

document.getElementById("totalPlayers").innerText=rankers.length;
}

function addRanker(){
let name=document.getElementById("name").value;
let mode=document.getElementById("mode").value;
let tier=document.getElementById("tier").value;
let img=document.getElementById("img").value;

if(name&&mode&&tier&&img){
rankers.push({name,mode,tier,img});
save();
render();
}
}

function clearAll(){
if(confirm("¿Seguro?")){
rankers=[];
save();
render();
}
}

document.getElementById("search").addEventListener("input",function(){
if(this.value==="bstaff2026"){
document.getElementById("modPanel").classList.remove("hidden");
}
render();
});

document.getElementById("modeFilter").addEventListener("change",render);
document.getElementById("tierFilter").addEventListener("change",render);

render();

</script>

</body>
</html>
