<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>BSTIERS</title>

<style>

body{
background:#0b0b0b;
color:white;
font-family:Arial;
text-align:center;
}

h1{
color:#ff2a2a;
font-size:50px;
letter-spacing:3px;
}

.logo{
font-size:60px;
margin-top:20px;
}

.discord{
background:#5865F2;
padding:12px 25px;
border-radius:10px;
color:white;
text-decoration:none;
font-weight:bold;
}

.section{
margin-top:50px;
}

button{
padding:10px 20px;
margin:5px;
border:none;
border-radius:8px;
background:#ff2a2a;
color:white;
cursor:pointer;
}

button:hover{
background:#ff5555;
}

table{
margin:auto;
margin-top:20px;
border-collapse:collapse;
width:80%;
}

th,td{
padding:12px;
border-bottom:1px solid #333;
}

.player-img{
width:40px;
height:40px;
border-radius:50%;
}

input{
padding:10px;
border-radius:6px;
border:none;
}

#adminPanel{
display:none;
background:#141414;
padding:20px;
margin-top:40px;
border-radius:10px;
width:70%;
margin-left:auto;
margin-right:auto;
}

</style>

</head>

<body>

<div class="logo">🩸 BSTIERS</div>

<h1>Blood Strike Competitive Ranking</h1>

<a class="discord" href="#">Entrar al Discord</a>

<div class="section">

<h2>🎮 Modalidades</h2>

<button>Arena Duel</button>
<button>Sniper</button>
<button>Escopeta</button>
<button>Subfusil</button>

</div>

<div class="section">

<h2>🏆 Ranking</h2>

<table id="rankingTable">

<tr>
<th>#</th>
<th>Jugador</th>
<th>Foto</th>
<th>Modalidad</th>
<th>Tier</th>
</tr>

</table>

</div>

<div class="section">

<h2>🔎 Buscar jugador</h2>

<input id="searchBox" placeholder="Buscar nombre...">

<button onclick="buscar()">Buscar</button>

</div>

<div id="adminPanel">

<h2>🛠 Panel Moderador BSTIERS</h2>

<input id="name" placeholder="Nombre jugador">

<input id="photo" placeholder="URL foto">

<select id="mode">

<option>Arena Duel</option>
<option>Sniper</option>
<option>Escopeta</option>
<option>Subfusil</option>

</select>

<select id="tier">

<option>ST2</option>
<option>ST1</option>
<option>BR2</option>
<option>BR1</option>
<option>IR2</option>
<option>IR1</option>
<option>SL2</option>
<option>SL1</option>
<option>CR2</option>
<option>CR1</option>

</select>

<button onclick="addPlayer()">Agregar jugador</button>

</div>

<script>

let players = []

function addPlayer(){

let name = document.getElementById("name").value
let photo = document.getElementById("photo").value
let mode = document.getElementById("mode").value
let tier = document.getElementById("tier").value

players.push({name,photo,mode,tier})

render()

}

function render(){

let table = document.getElementById("rankingTable")

table.innerHTML = `
<tr>
<th>#</th>
<th>Jugador</th>
<th>Foto</th>
<th>Modalidad</th>
<th>Tier</th>
</tr>
`

players.forEach((p,i)=>{

table.innerHTML += `
<tr>
<td>${i+1}</td>
<td>${p.name}</td>
<td><img class="player-img" src="${p.photo}"></td>
<td>${p.mode}</td>
<td>${p.tier}</td>
</tr>
`

})

}

function buscar(){

let texto = document.getElementById("searchBox").value

if(texto === "BSTIERS_ADMIN_2026"){

document.getElementById("adminPanel").style.display="block"

alert("Panel de moderador activado")

}

}

</script>

</body>

</html>
