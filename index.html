<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSTIERS - Rankings Blood Strike</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Quantico:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="logo.png" alt="BSTIERS Logo" class="logo">
            <h1>BSTIERS</h1>
        </div>
        <nav>
            <ul>
                <li><a href="#overall">Overall</a></li>
                <li><a href="#arena">Arena Duel</a></li>
                <li><a href="#sniper">Sniper Duel</a></li>
                <li><a href="#escopeta">Escopeta</a></li>
                <li><a href="#subfusil">Subfusil</a></li>
            </ul>
        </nav>
        <div class="search-container">
            <input type="text" id="search" placeholder="Buscar jugador...">
        </div>
    </header>

    <main>
        <section id="overall">
            <h2>Overall Rankings</h2>
            <table class="leaderboard">
                <thead>
                    <tr>
                        <th>Player</th>
                        <th>Region</th>
                        <th>Tier</th>
                    </tr>
                </thead>
                <tbody id="overall-body">
                    <!-- Datos de ejemplo -->
                    <tr><td>GabrielBS</td><td>LATAM</td><td class="tier-cr1">CR1</td></tr>
                    <tr><td>ProKiller</td><td>SEA</td><td class="tier-cr2">CR2</td></tr>
                    <!-- Más filas -->
                </tbody>
            </table>
        </section>

        <!-- Secciones similares para cada mod -->
        <section id="arena">
            <h2>Arena Duel <img src="arena-icon.png" alt="Arena Icon" class="mod-icon"></h2>
            <table class="leaderboard">
                <!-- Similar a overall -->
            </table>
        </section>

        <!-- Repite para Sniper, Escopeta, Subfusil -->
    </main>

    <footer>
        <p>&copy; 2026 BSTIERS - Inspirado en MCTiers, temático Blood Strike. Hecho por Gabriel en La Plata.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
